<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机自适应 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迈克尔逊干涉波长计算(Phyphox光强版)</title>
    <!-- 在线引入绘图库，无需本地文件 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { max-width: 800px; margin: 20px auto; padding: 0 15px; font-family: system-ui; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        canvas { width: 100%; max-height: 350px; }
        input, button { padding: 6px 10px; font-size: 16px; }
        .res-text { font-size: 18px; font-weight: bold; color: #c00; }
    </style>
</head>
<body>
    <h2>迈克尔逊干涉条纹波长计算工具</h2>

    <div class="card">
        <h3>1. 上传Phyphox导出文件(txt/csv)</h3>
        <input type="file" id="fileInput" accept=".txt,.csv">
        <p>支持：空格分隔txt、逗号分隔csv（科学计数法自动识别）</p>
    </div>

    <div class="card">
        <h3>2. 参数输入</h3>
        <label>动镜移动距离 Δd (单位：mm)：</label>
        <input type="number" id="deltaD" step="0.001" placeholder="例如 0.05">
        <br><br>
        <button onclick="calcAll()">开始分析计算</button>
    </div>

    <div class="card">
        <h3>3. 计算结果</h3>
        <p>识别条纹总数 N：<span id="peakNum" class="res-text">--</span></p>
        <p>计算波长 λ：<span id="waveLen" class="res-text">--</span> nm</p>
    </div>

    <div class="card">
        <h3>4. 光强曲线</h3>
        <canvas id="chartCanvas"></canvas>
    </div>

<script>
let timeData = [];
let lightRaw = [];
let chartIns = null;

// ========== 【修改后的文件解析函数：兼容空格、逗号分隔】 ==========
function parseText(text) {
    const timeArr = [];
    const lightArr = [];
    const lines = text.split('\n');
    for (const line of lines) {
        let row = line.trim();
        // 跳过注释行、空行
        if (!row || row.startsWith('#')) continue;
        // 统一把逗号替换为空格，再按任意空白分割
        row = row.replace(/,/g, ' ');
        const parts = row.split(/\s+/);
        if (parts.length < 2) continue;
        const t = parseFloat(parts[0]);
        const val = parseFloat(parts[1]);
        if (!isNaN(t) && !isNaN(val)) {
            timeArr.push(t);
            lightArr.push(val);
        }
    }
    return {time: timeArr, light: lightArr};
}

// 滑动平均平滑
function smoothSignal(signal, window=10) {
    const res = [];
    const half = Math.floor(window/2);
    const len = signal.length;
    for(let i=0; i<len; i++){
        let sum = 0, cnt = 0;
        for(let j=i-half; j<=i+half; j++){
            if(j>=0 && j<len){
                sum += signal[j];
                cnt++;
            }
        }
        res.push(sum / cnt);
    }
    return res;
}

// 统计波峰数量
function countPeaks(smoothData) {
    let cnt = 0;
    const diff = [];
    for(let i=1; i<smoothData.length; i++){
        diff.push(smoothData[i] - smoothData[i-1]);
    }
    for(let i=1; i<diff.length; i++){
        if(diff[i-1] > 0 && diff[i] < 0) cnt++;
    }
    return cnt;
}

// 绘制曲线
function drawChart(timeRaw, rawLight, smoothLight) {
    const ctx = document.getElementById('chartCanvas').getContext('2d');
    if(chartIns) chartIns.destroy();
    chartIns = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timeRaw,
            datasets: [
                {
                    label: '原始光强',
                    data: rawLight,
                    borderColor: '#999',
                    fill: false,
                    pointRadius: 0,
                    borderWidth: 1,
                },
                {
                    label: '平滑光强',
                    data: smoothLight,
                    borderColor: '#f44336',
                    fill: false,
                    pointRadius: 0,
                    borderWidth: 2,
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: {title: {display:true, text:'时间 / s'}},
                y: {title: {display:true, text:'光强值'}}
            }
        }
    });
}

// 主计算逻辑
function calcAll() {
    if(timeData.length === 0) {
        alert("请先上传数据文件！");
        return;
    }
    const deltaD = parseFloat(document.getElementById('deltaD').value);
    if(isNaN(deltaD) || deltaD <= 0) {
        alert("请输入合法的移动距离Δd！");
        return;
    }
    const smoothLight = smoothSignal(lightRaw, 10);
    const N = countPeaks(smoothLight);
    document.getElementById('peakNum').innerText = N;
    // λ=2Δd/N，单位mm转nm
    const lambdaMm = 2 * deltaD / N;
    const lambdaNm = lambdaMm * 1e6;
    document.getElementById('waveLen').innerText = lambdaNm.toFixed(2);
    drawChart(timeData, lightRaw, smoothLight);
}

// 监听文件上传
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
        const text = ev.target.result;
        const data = parseText(text);
        timeData = data.time;
        lightRaw = data.light;
        alert(`读取成功，共加载 ${timeData.length} 组数据`);
    }
    reader.readAsText(file);
})
</script>
</body>
</html>
